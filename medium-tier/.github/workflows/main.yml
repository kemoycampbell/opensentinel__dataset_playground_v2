name: "Github Actions Activity"

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Terraform Action to Perform'
        type: choice
        options:
          - Terraform_apply
          - Terraform_destroy

jobs:
  terraform_automate:
    name: ${{ github.event.inputs.action }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: production/wordpress

    steps:
      # Step 1: Check out the repository code
      - name: Checkout repository
        uses: actions/checkout@v2

      # Step 2: Set up AWS credentials for authentication
      - name: Set up AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION }}

      # Step 3: Install Terraform
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2.0.2
        with:
          terraform_version: 1.10.3 # Specifies the Terraform version to use
          terraform_wrapper: false

      # Step 4: Set the credentials environment variables from GitHub Secrets
      - name: Set credentials environment variables
        run: |
          echo 'credentials = {' >> .auto.tfvars
          echo '  db_username  = "${{ secrets.DB_USERNAME }}"' >> .auto.tfvars
          echo '  db_password  = "${{ secrets.DB_PASSWORD }}"' >> .auto.tfvars
          echo '  ssh_key_name = "${{ secrets.SSH_KEY_NAME }}"' >> .auto.tfvars
          echo '  wp_username = "${{ secrets.WP_USERNAME }}"' >> .auto.tfvars
          echo '  wp_password = "${{ secrets.WP_PASSWORD }}"' >> .auto.tfvars
          echo '}' >> .auto.tfvars

      # Step 5: Show the Terraform version
      - name: Show Terraform version
        run: terraform --version

      # Step 6: Initialize Terraform working directory
      - name: Terraform Init
        run: terraform init

      # Step 7: Preview the infrastructure changes (Plan)
      - name: Terraform Plan
        if: ${{ github.event.inputs.action == 'Terraform_apply' }}
        run: terraform plan

      # Step 8: Apply the infrastructure changes (Apply)
      - name: Terraform Apply
        if: ${{ github.event.inputs.action == 'Terraform_apply' }}
        run: terraform apply -auto-approve

      # Step 9: Destroy the infrastructure changes (Destroy)
      - name: Terraform Destroy
        if: ${{ github.event.inputs.action == 'Terraform_destroy' }}
        run: terraform destroy -auto-approve
